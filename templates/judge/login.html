{% extends "base.html" %}

{% block body %}
<main class="auth-screen">
    <form method="post" class="auth-card">
        <h1>Ingreso de Jueces</h1>
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <label class="form-label">Usuario</label>
        <input class="form-control" name="username" autocomplete="username" required>
        <label class="form-label mt-3">Contraseña</label>
        <input class="form-control" name="password" type="password" autocomplete="current-password" required>
        <button class="btn btn-primary w-100 mt-4">Entrar</button>
    </form>
</main>
{% endblock %}
