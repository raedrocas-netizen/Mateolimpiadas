<!doctype html>
<html lang="es" data-theme="light" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
        (function () {
            var storageKey = "mateolimpiadas-theme";
            var theme = null;

            try {
                theme = localStorage.getItem(storageKey);
            } catch (error) {
                theme = null;
            }

            if (theme !== "light" && theme !== "dark") {
                theme = window.matchMedia("(prefers-color-scheme: dark)").matches
                    ? "dark"
                    : "light";
            }

            document.documentElement.setAttribute("data-theme", theme);
            document.documentElement.setAttribute("data-bs-theme", theme);
        }());
    </script>
    <title>Olimpiadas del Conocimiento</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logos/logo_olimpiadas_matematica.png') }}">
    <link href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/theme.js') }}" defer></script>
</head>
<body class="{% block body_class %}{% endblock %}">
    <a class="skip-link" href="#main-content">Saltar al contenido principal</a>
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Activar modo oscuro" aria-pressed="false" title="Activar modo oscuro">
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.2 15.7A8.4 8.4 0 0 1 8.3 3.8 8.5 8.5 0 1 0 20.2 15.7Z"></path>
        </svg>
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
        </svg>
        <span class="theme-toggle-label">Tema</span>
    </button>
    <div class="app-content">
        {% block body %}{% endblock %}
    </div>
    {% include "includes/footer.html" %}
    {% block vendor_scripts %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
